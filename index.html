<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método de Ancoramento Arquetípico</title>
    <!-- Fontes e Icones -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #cda242; --dark: #0b0704; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--dark); color: #f5f5f7; line-height: 1.6; font-family: 'Poppins', sans-serif; }
        h1, h2 { font-family: 'Cinzel', serif; text-transform: uppercase; }
        .subtitle { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; }

        /* Partículas de Fundo */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle at center, #1a120b 0%, var(--dark) 100%); z-index: -1; }

        /* HERO REFINADO */
        header { padding: 60px 0; text-align: center; }
        .hero-image-area { position: relative; display: inline-block; }
        .hero-image-area img { width: 60%; max-width: 500px; border-radius: 10px; box-shadow: 0 0 50px rgba(205, 162, 66, 0.3); }

        /* BOTÃO FIXO MOBILE */
        .fixed-cta { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: rgba(0,0,0,0.9); text-align: center; z-index: 1000; border-top: 1px solid var(--gold); display: none; }
        @media (max-width: 768px) { .fixed-cta { display: block; } .hero-image-area img { width: 90%; } }

        .cta-button { background: var(--gold); color: #000; padding: 20px 40px; border-radius: 50px; font-weight: 800; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="particles"></div>

    <header>
        <div class="container">
            <h1>Método de <span class="gold-text">Ancoramento Arquetípico</span></h1>
            <p class="subtitle">Aprenda a ativar os arquétipos da forma correta e descubra como potencializar resultados.</p>
            
            <div class="hero-image-area">
                <img src="foto.jpg.png" alt="Método de Ancoramento Arquetípico">
            </div>
        </div>
    </header>

    <!-- GARANTIA -->
    <section style="padding: 50px 0; text-align: center; border-top: 1px solid var(--gold);">
        <i data-lucide="shield-check" style="color: var(--gold); width: 48px; height: 48px;"></i>
        <h2>7 Dias de Garantia Incondicional</h2>
        <p>Se você não se sentir satisfeita, devolvo 100% do seu dinheiro.</p>
    </section>

    <!-- BARRA FIXA MOBILE -->
    <div class="fixed-cta">
        <a href="#comprar" class="cta-button">Acessar Agora</a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
